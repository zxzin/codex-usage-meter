name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            args: --bundles app,dmg
          - name: Windows
            runner: windows-latest
            args: --bundles nsis,msi
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: Token Meter ${{ inputs.tag || github.ref_name }}
          releaseBody: |
            Download the installer for your system:

            - macOS: download the `.dmg` asset.
            - Windows: download the `.exe` NSIS installer; `.msi` is provided as an alternate installer.

            These builds are currently unsigned, so macOS Gatekeeper or Windows SmartScreen may show a warning.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
